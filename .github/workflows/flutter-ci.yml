name: Flutter CI

on:
  push:
    paths:
      - 'Cine-main/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    paths:
      - 'Cine-main/**'
  workflow_dispatch:

jobs:
  build:
    name: Analyze · Test · APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Cine-main
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.5'
          cache: true

      - name: Dependencias
        run: flutter pub get

      - name: Análisis estático
        run: flutter analyze --no-fatal-infos

      - name: Pruebas
        run: flutter test

      # El APK apunta al backend definido en las Variables del repo
      # (Settings → Secrets and variables → Actions → Variables):
      #   API_HOST   = tu-app.up.railway.app
      #   API_SECURE = true
      # Si no están definidas, cae a localhost (útil solo para validar el build).
      - name: Build APK (release)
        run: >
          flutter build apk --release
          --dart-define=API_HOST=${{ vars.API_HOST || 'localhost:8000' }}
          --dart-define=API_SECURE=${{ vars.API_SECURE || 'false' }}

      - name: Publicar APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: cinesync-apk
          path: Cine-main/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

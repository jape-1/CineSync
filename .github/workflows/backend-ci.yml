name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Correr pruebas
        run: pytest -q

  docker-build:
    name: Build imagen Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validar que la imagen del backend compila
        run: docker build -t cinesync-api ./backend

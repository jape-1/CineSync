# CineSync — orquestación local: API (FastAPI) + BD (PostgreSQL).
# Levantar con:  docker compose up --build

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cinesync
      POSTGRES_PASSWORD: cinesync
      POSTGRES_DB: cinesync
    ports:
      - "5432:5432"
    volumes:
      - cinesync_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinesync -d cinesync"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  cinesync_pgdata:
